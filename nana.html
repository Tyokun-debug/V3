<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soluciones Amables</title>
    <style>
        :root {
            --bg: #0a0f1e;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #22c55e;
            --text: #f8fafc;
            --danger: #ef4444;
            --db: #3b82f6;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); color: var(--text);
            margin: 0; padding: 15px; text-align: center;
            min-height: 100vh;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        
        .btn { 
            height: 110px; border: none; border-radius: 20px; background: var(--card);
            backdrop-filter: blur(10px); color: white; font-weight: bold; font-size: 0.75rem;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
            border-bottom: 5px solid;
        }
        
        .a { border-color: var(--accent); }
        .b { border-color: var(--db); }
        .c { border-color: var(--danger); }
        .d { border-color: #eab308; }

        .overlay { 
            display: none; position: fixed; inset: 0; background: rgba(10, 15, 30, 0.98); 
            z-index: 1000; padding: 25px; backdrop-filter: blur(20px); 
            flex-direction: column; align-items: center; justify-content: center; 
        }

        /* DISEÑO DE LA TARJETA DE VENTA */
        .confirm-card {
            background: #1e293b; width: 100%; max-width: 350px;
            padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
        }

        .input-manual {
            width: 100%; background: transparent; border: none; border-bottom: 2px solid #334155;
            color: white; font-size: 1.5rem; text-align: center; margin-bottom: 20px; font-weight: bold;
        }

        .selector-cantidad {
            display: flex; align-items: center; justify-content: center; gap: 20px; margin: 20px 0;
        }

        .btn-qty {
            width: 60px; height: 60px; border-radius: 50%; border: none;
            background: var(--card); color: white; font-size: 1.5rem; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #qty-display { font-size: 2.5rem; font-weight: 800; min-width: 50px; }

        .action-btn { 
            width: 100%; padding: 20px; border: none; border-radius: 18px; 
            font-size: 1.1rem; font-weight: bold; color: white; margin-top: 15px;
        }
    </style>
</head>
<body>
    <h2>Soluciones Amables</h2>

    <div class="grid">
        <button class="btn a" onclick="abrirVoz()"><span>&#127897;</span><span>USAR MICRO</span></button>
        <button class="btn b" onclick="verResumen()"><span>&#128176;</span><span>TOTAL VENTAS</span></button>
        <button class="btn c" onclick="resetDia()"><span>&#128260;</span><span>REINICIO D&Iacute;A</span></button>
        <button class="btn d" onclick="guardarTodo()"><span>&#128229;</span><span>REPORTE</span></button>
        <button class="btn b" style="border-color:#a855f7" onclick="abrirVentaRapida()"><span>&#9889;</span><span>VENTA R&Aacute;PIDA</span></button>
        <button class="btn a" style="border-color:#3b82f6" onclick="abrirGuardarCatalogo()"><span>&#128190;</span><span>A&Ntilde;ADIR ITEM</span></button>
    </div>

    <div id="modal-escuchando" class="overlay">
        <div style="font-size: 5rem; animation: pulse 1.5s infinite;">&#127897;</div>
        <h3 id="texto-escuchado">Hable ahora...</h3>
    </div>

    <div id="pantalla-confirmar" class="overlay">
        <div class="confirm-card">
            <input type="text" id="conf-nombre" class="input-manual" placeholder="PRODUCTO">
            
            <div style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px;">PRECIO UNITARIO (S/)</div>
            <input type="number" id="conf-precio" class="input-manual" style="color: var(--accent); font-size: 2rem;">

            <div style="font-size: 0.8rem; color: #94a3b8;">CANTIDAD</div>
            <div class="selector-cantidad">
                <button class="btn-qty" onclick="cambiarQty(-1)">-</button>
                <div id="qty-display">1</div>
                <button class="btn-qty" onclick="cambiarQty(1)">+</button>
            </div>

            <button class="action-btn" style="background:var(--accent);" onclick="finalizarVenta()">REGISTRAR VENTA</button>
            <button class="action-btn" style="background:transparent; color:var(--danger);" onclick="cerrarOverlays()">CANCELAR</button>
        </div>
    </div>

    <div id="pantalla-catalogo" class="overlay">
        <div class="confirm-card">
            <h3>NUEVO PRODUCTO</h3>
            <input type="text" id="cat-nombre" class="input-manual" placeholder="Nombre">
            <input type="number" id="cat-precio" class="input-manual" placeholder="S/ Precio">
            <button class="action-btn" style="background:var(--db);" onclick="guardarEnCatalogo()">GUARDAR</button>
            <button class="action-btn" style="background:transparent; color:var(--danger);" onclick="cerrarOverlays()">CERRAR</button>
        </div>
    </div>

    <script>
        const productosBase = { 
            "control lg": 10, "control hyundai": 10, "control samsung": 10, "control nex": 10, 
            "control philips": 10, "control panasonic": 10, "control haier": 10, "control hisense": 10, 
            "control miray": 10, "control jvc": 10, "control aoc": 10, "control tcl": 10, 
            "control daewoo": 10, "control direct tv": 10, "control claro": 10, "control movistar": 10, 
            "control tv box": 10, "cargador 12v": 15, "cargador 19v": 40, "hdmi": 10, "pilas": 2
        };

        let catalogoPersonal = JSON.parse(localStorage.getItem('catalogo_amable')) || {};
        let ventas = JSON.parse(localStorage.getItem('ventas_v1_soluciones')) || [];
        let qtyActual = 1;

        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-PE';

        function abrirVoz() {
            document.getElementById('modal-escuchando').style.display = 'flex';
            rec.start();
        }

        rec.onresult = (e) => {
            const texto = e.results[0][0].transcript.toLowerCase().trim();
            document.getElementById('texto-escuchado').innerText = texto;
            setTimeout(() => { prepararVenta(texto); }, 600);
        };

        function prepararVenta(nombre) {
            rec.stop();
            const precio = productosBase[nombre] || catalogoPersonal[nombre] || 10; // 10 por defecto
            
            cerrarOverlays();
            document.getElementById('pantalla-confirmar').style.display = 'flex';
            document.getElementById('conf-nombre').value = nombre.toUpperCase();
            document.getElementById('conf-precio').value = precio;
            qtyActual = 1;
            actualizarQtyUI();
        }

        function cambiarQty(valor) {
            qtyActual += valor;
            if (qtyActual < 1) qtyActual = 1;
            actualizarQtyUI();
        }

        function actualizarQtyUI() {
            document.getElementById('qty-display').innerText = qtyActual;
        }

        function finalizarVenta() {
            const nom = document.getElementById('conf-nombre').value;
            const pre = parseFloat(document.getElementById('conf-precio').value);
            
            for(let i=0; i < qtyActual; i++) {
                ventas.push({ n: nom, t: pre, h: new Date().toLocaleTimeString() });
            }
            
            localStorage.setItem('ventas_v1_soluciones', JSON.stringify(ventas));
            cerrarOverlays();
            alert("¡Venta registrada!");
        }

        function abrirVentaRapida() { prepararVenta(""); }
        function abrirGuardarCatalogo() { document.getElementById('pantalla-catalogo').style.display='flex'; }

        function guardarEnCatalogo() {
            const n = document.getElementById('cat-nombre').value.toLowerCase().trim();
            const p = parseFloat(document.getElementById('cat-precio').value);
            if(n && !isNaN(p)) {
                catalogoPersonal[n] = p;
                localStorage.setItem('catalogo_amable', JSON.stringify(catalogoPersonal));
                cerrarOverlays();
            }
        }

        function verResumen() {
            let total = ventas.reduce((acc, v) => acc + v.t, 0);
            alert("Total: S/ " + total.toFixed(2));
        }

        function resetDia() { if(confirm("¿Reiniciar?")) { ventas=[]; localStorage.removeItem('ventas_v1_soluciones'); location.reload(); } }
        function cerrarOverlays() { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); }
        function guardarTodo() { alert("Reporte listo en memoria."); }
    </script>
</body>
</html>
